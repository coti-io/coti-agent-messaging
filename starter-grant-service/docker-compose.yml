services:
  starter-grant-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: coti-agent-messaging/starter-grant-service:local
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${STARTER_GRANT_SERVICE_BIND_HOST:-127.0.0.1}:${STARTER_GRANT_SERVICE_PORT:-8787}:${STARTER_GRANT_SERVICE_PORT:-8787}"
    volumes:
      - ./.data:/app/.data
      - "${OUTREACH_ATTRIBUTION_DB_PATH:-/tmp/starter-grant-outreach-attribution.sqlite}:${OUTREACH_ATTRIBUTION_DB_PATH:-/tmp/starter-grant-outreach-attribution.sqlite}"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch("http://127.0.0.1:" + (process.env.STARTER_GRANT_SERVICE_PORT || "8787") + "/health")
          .then((response) => process.exit(response.ok ? 0 : 1))
          .catch(() => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
